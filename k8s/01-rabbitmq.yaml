# ============================================================================
# RabbitMQ - heranca do TP2 (broker pub/sub do Cluster Sync).
# A parte NOVA do TP3 (Cluster Store) nao usa middleware nenhum.
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: tp3
spec:
  replicas: 1
  selector:
    matchLabels: { app: rabbitmq }
  template:
    metadata:
      labels: { app: rabbitmq }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "admin"
            - name: RABBITMQ_DEFAULT_PASS
              value: "admin123"
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 768Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: tp3
spec:
  selector: { app: rabbitmq }
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
---
# Painel de administracao do RabbitMQ acessivel de fora (opcional)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-mgmt
  namespace: tp3
spec:
  type: NodePort
  selector: { app: rabbitmq }
  ports:
    - name: mgmt
      port: 15672
      targetPort: 15672
      nodePort: 31672
